<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 1. CAMBIO DE TÍTULO EN LA PESTAÑA -->
    <title>SmartPark | Estacionamiento Autónomo</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-body: #0f172a;
            --glass-card: rgba(30, 41, 59, 0.5);
            --accent: #38bdf8;
        }
        body { 
            background-color: var(--bg-body); 
            color: #f8fafc; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        /* Efecto de cristal para la navegación */
        .glass-nav { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        
        /* Sección de encabezado principal */
        .hero-section { 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); 
            padding: 60px 0; 
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
            margin-bottom: 40px; 
        }

        /* Estilo de las tarjetas de cochera */
        .card-parking { 
            background: var(--glass-card); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 18px; 
            transition: all 0.3s ease; 
            height: 100%;
        }
        
        .card-parking:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent); 
            box-shadow: 0 12px 20px -10px rgba(56, 189, 248, 0.25); 
        }

        /* Etiquetas de estado */
        .status-badge { 
            padding: 4px 12px; 
            border-radius: 12px; 
            font-size: 0.65rem; 
            font-weight: 800; 
            text-transform: uppercase; 
        }
        
        .bg-libre { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .bg-ocupado { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }

        .icon-box { font-size: 1.5rem; margin-bottom: 10px; }
        h4.cochera-num { font-size: 0.9rem; font-weight: 700; color: #e2e8f0; }
    </style>
</head>
<body>

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-p-square-fill me-2 text-info"></i>SmartPark</a>
            <div class="ms-auto">
                <a class="btn btn-outline-info btn-sm px-4 rounded-pill" href="/registrar">
                    <i class="bi bi-plus-circle me-1"></i> Ingreso
                </a>
                <!-- Link discreto al panel de administración -->
                <a class="btn btn-link btn-sm text-secondary text-decoration-none ms-2" href="/admin">
                    <i class="bi bi-shield-lock"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- 2. ENCABEZADO CON LA NUEVA INFORMACIÓN -->
    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold mb-2 text-white">Estacionamiento Autónomo</h1>
            <p class="text-info opacity-75 fw-semibold mb-0">
                SISTEMA DE GESTIÓN INTELIGENTE
            </p>
            <p class="text-secondary small mt-2">
                Desarrollado por <span class="text-light">Claudio Pérez & Tomás Naveda</span>
            </p>
        </div>
    </header>

    <main class="container mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="mb-0 fw-bold">Disponibilidad</h3>
                <p class="text-muted small mb-0">Consulta el estado de las 30 cocheras en tiempo real</p>
            </div>
            <div class="text-end">
                <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-3 py-2">
                    Sistema Activo
                </span>
            </div>
        </div>

        <!-- CONTENEDOR DE GRILLA (6 columnas en escritorio para simetría) -->
        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-6 g-4" id="contenedor-espacios">
            <!-- Los espacios se cargan aquí mediante JavaScript -->
        </div>
    </main>

    <script>
        function actualizarTablero() {
            fetch('/espacios')
                .then(res => res.json())
                .then(data => {
                    const contenedor = document.getElementById('contenedor-espacios');
                    contenedor.innerHTML = ''; 
                    
                    data.forEach(espacio => {
                        const esLibre = espacio.estado === 'libre';
                        const statusClass = esLibre ? 'bg-libre' : 'bg-ocupado';
                        const icon = esLibre ? 'bi-check-circle' : 'bi-car-front-fill';
                        const iconColor = esLibre ? 'text-success' : 'text-danger';

                        contenedor.innerHTML += `
                            <div class="col">
                                <div class="card card-parking text-center">
                                    <div class="card-body p-3">
                                        <div class="icon-box ${iconColor}">
                                            <i class="bi ${icon}"></i>
                                        </div>
                                        <h4 class="cochera-num">${espacio.numero}</h4>
                                        <span class="status-badge ${statusClass}">${espacio.estado}</span>
                                    </div>
                                </div>
                            </div>`;
                    });
                })
                .catch(err => console.error("Error al cargar cocheras:", err));
        }

        // Ejecutar al cargar y actualizar cada 10 segundos
        actualizarTablero();
        setInterval(actualizarTablero, 10000);
    </script>
</body>
</html>
