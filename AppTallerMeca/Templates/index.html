<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playa de Estacionamiento | Estacionamiento Autónomo</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-body: #0f172a;
            --glass-card: rgba(30, 41, 59, 0.5);
            --accent: #38bdf8;
            --parking-line: #fbbf24; /* Amarillo para las líneas de estacionamiento */
        }
        body { 
            background-color: var(--bg-body); 
            color: #f8fafc; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        .glass-nav { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        
        .hero-section { 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); 
            padding: 40px 0; 
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
            margin-bottom: 40px; 
            position: relative;
            overflow: hidden;
        }

        /* Decoración: Auto flotando suavemente */
        .hero-car-icon {
            font-size: 3.5rem;
            color: var(--accent);
            display: block;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .card-parking { 
            background: var(--glass-card); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 12px; 
            transition: all 0.3s ease; 
            height: 100%;
            position: relative;
        }
        
        /* Decoración: Líneas de estacionamiento a los costados */
        .card-parking::before, .card-parking::after {
            content: '';
            position: absolute;
            top: 15%;
            height: 70%;
            width: 3px;
            background: var(--parking-line);
            opacity: 0.3;
        }
        .card-parking::before { left: -10px; }
        .card-parking::after { right: -10px; }

        .status-badge { 
            padding: 4px 12px; 
            border-radius: 12px; 
            font-size: 0.65rem; 
            font-weight: 800; 
            text-transform: uppercase; 
        }
        
        .bg-libre { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .bg-ocupado { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }

        .icon-box { font-size: 1.5rem; margin-bottom: 10px; }
        h4.cochera-num { font-size: 0.8rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; }

        .cronometro { font-family: monospace; font-size: 0.85rem; color: var(--accent); margin-top: 5px; }
        .precio-ticket { font-size: 0.9rem; font-weight: bold; color: #f8fafc; margin-bottom: 8px; }

        .btn-liberar {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid rgba(248, 113, 113, 0.4);
            color: #f87171;
            background: transparent;
        }
        .btn-liberar:hover { background: rgba(239, 68, 68, 0.2); color: white; }

        /* Señalética de entrada/salida */
        .parking-signal {
            font-size: 0.7rem;
            color: var(--parking-line);
            font-weight: bold;
            opacity: 0.6;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-p-square-fill me-2 text-info"></i>Playa de Estacionamiento</a>
            <div class="ms-auto">
                <a class="btn btn-outline-info btn-sm px-4 rounded-pill" href="/registrar">
                    <i class="bi bi-plus-circle me-1"></i> Ingreso
                </a>
            </div>
        </div>
    </nav>
    
    <header class="hero-section text-center">
        <div class="container">
            <i class="bi bi-car-front-fill hero-car-icon"></i>
            <h1 class="display-4 fw-bold mb-2 text-white">Estacionamiento Autónomo</h1>
            <p class="text-info opacity-75 fw-semibold mb-0">SISTEMA DE GESTIÓN INTELIGENTE</p>
            <p class="text-secondary small mt-2">Desarrollado por <span class="text-light">Claudio Pérez & Tomás Naveda</span></p>
        </div>
    </header>

    <main class="container mb-5">
        <div class="row mb-5 justify-content-center">
            <div class="col-md-5">
                <div class="card bg-dark border-info text-center p-4 rounded-4 shadow-lg" style="background: rgba(30, 41, 59, 0.8) !important;">
                    <div class="text-info small fw-bold mb-2 text-uppercase" style="letter-spacing: 2px;">Tarifa Vigente</div>
                    <div class="d-flex align-items-center justify-content-center mb-3">
                        <span class="display-4 fw-bold text-white">$<span id="tarifa-valor">{% if tarifa %}{{ tarifa.valor_hora }}{% else %}1000.0{% endif %}</span></span>
                        <span class="fs-5 text-info ms-2">/ h</span>
                    </div>
                    <button class="btn btn-outline-info btn-sm rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#modalTarifa">
                        <i class="bi bi-pencil-square me-1"></i> Ajustar Precio
                    </button>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-end mb-4">
            <div>
                <div class="parking-signal"><i class="bi bi-arrow-down-circle"></i> ZONA DE APARCAMIENTO</div>
                <h3 class="fw-bold mb-0">Nivel Principal</h3>
            </div>
            <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-3 py-2">
                <i class="bi bi-dot"></i> SISTEMA ACTIVO
            </span>
        </div>

        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-6 g-5" id="contenedor-espacios">
            <!-- JS carga las cocheras aquí -->
        </div>
    </main>

    <!-- MODAL TARIFA -->
    <div class="modal fade" id="modalTarifa" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-info">
                <div class="modal-header border-info">
                    <h5 class="modal-title">Actualizar Tarifa</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form action="/actualizar_tarifa" method="POST">
                    <div class="modal-body">
                        <label class="form-label">Monto por hora ($)</label>
                        <input type="number" step="0.01" name="nuevo_valor" class="form-control bg-secondary text-white border-0" required>
                    </div>
                    <div class="modal-footer border-info">
                        <button type="submit" class="btn btn-info px-4">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const TARIFA_HORA = parseFloat(document.getElementById('tarifa-valor').innerText);
        let intervaloRelojes;

        function actualizarTablero() {
            fetch('/espacios')
                .then(res => res.json())
                .then(data => {
                    const contenedor = document.getElementById('contenedor-espacios');
                    contenedor.innerHTML = ''; 
                    clearInterval(intervaloRelojes);

                    data.forEach(espacio => {
                        const esLibre = espacio.estado === 'libre';
                        const icon = esLibre ? 'bi-check-circle' : 'bi-car-front-fill';
                        const iconColor = esLibre ? 'text-success' : 'text-info';

                        let infoExtra = esLibre ? '' : `
                            <div class="cronometro" data-inicio="${espacio.fecha_ingreso}" id="reloj-${espacio.id}">00:00:00</div>
                            <div class="precio-ticket" id="precio-${espacio.id}">$0.00</div>
                            <button class="btn btn-liberar w-100 mt-2" onclick="liberarCochera(${espacio.id})">LIBERAR</button>
                        `;

                        contenedor.innerHTML += `
                            <div class="col">
                                <div class="card card-parking text-center">
                                    <div class="card-body p-3">
                                        <h4 class="cochera-num">ESPACIO ${espacio.numero}</h4>
                                        <div class="icon-box ${iconColor}"><i class="bi ${icon}"></i></div>
                                        <span class="status-badge ${esLibre ? 'bg-libre' : 'bg-ocupado'}">${espacio.estado}</span>
                                        ${infoExtra}
                                    </div>
                                </div>
                            </div>`;
                    });
                    iniciarContadores();
                });
        }

        function iniciarContadores() {
            intervaloRelojes = setInterval(() => {
                document.querySelectorAll('.cronometro').forEach(reloj => {
                    const diff = Math.floor((new Date() - new Date(reloj.dataset.inicio)) / 1000);
                    if (diff >= 0) {
                        const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                        const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                        const s = (diff % 60).toString().padStart(2, '0');
                        reloj.innerText = `${h}:${m}:${s}`;
                        const total = (Math.max(1, diff / 3600) * TARIFA_HORA).toFixed(2);
                        document.getElementById(`precio-${reloj.id.split('-')[1]}`).innerText = `$${total}`;
                    }
                });
            }, 1000);
        }

        function liberarCochera(id) {
            if (confirm("¿Confirmar salida del vehículo?")) {
                fetch(`/egreso/${id}`, { method: 'POST' }).then(() => actualizarTablero());
            }
        }

        actualizarTablero();
        setInterval(actualizarTablero, 30000); 
    </script>
</body>
</html>
