<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark | Panel DEV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-body: #0f172a;
            --glass-card: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif;
            margin-bottom: 50px;
        }

        .dev-container {
            background: var(--glass-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text-main);
            table-layout: fixed;
            width: 100%;
            margin-bottom: 0;
        }

        .table thead th {
            color: var(--accent);
            border-bottom: 2px solid rgba(56, 189, 248, 0.2);
            background: transparent !important;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .table td {
            background: transparent !important;
            border-color: rgba(255,255,255,0.05);
            padding: 15px 10px;
            vertical-align: middle;
            white-space: nowrap;
        }

        /* Anchos fijos para evitar que se corra */
        .col-cochera { width: 15%; }
        .col-estado { width: 12%; }
        .col-patente { width: 18%; }
        .col-tiempo { width: 20%; }
        .col-monto { width: 15%; }
        .col-acciones { width: 10%; text-align: right; }

        .patente-display {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            padding: 4px 10px;
            border-radius: 5px;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .status-pill {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .pill-libre { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .pill-ocupado { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .btn-action {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--accent);
            padding: 5px 10px;
            border-radius: 6px;
            transition: 0.2s;
        }
        .btn-action:hover {
            background: var(--accent);
            color: white;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark p-3">
        <div class="container">
            <span class="navbar-brand fw-bold text-info">
                <i class="bi bi-cpu me-2"></i>SMARTPARK | PANEL ADMIN
            </span>
            <a href="/" class="btn btn-outline-light btn-sm rounded-pill px-3">Volver al Inicio</a>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <small class="text-secondary d-block">ESTADO GENERAL</small>
                <h2 id="total-ocupado" class="h4 mb-0 fw-bold">Cargando...</h2>
            </div>
            <button onclick="resetearBase()" class="btn btn-outline-danger btn-sm rounded-pill px-3">
                <i class="bi bi-arrow-counterclockwise me-1"></i> Reiniciar Todo
            </button>
        </div>

        <div class="dev-container">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th class="col-cochera">Cochera</th>
                            <th class="col-estado">Estado</th>
                            <th class="col-patente">Patente</th>
                            <th class="col-tiempo">Tiempo</th>
                            <th class="col-monto">Cobro (AR$)</th>
                            <th class="col-acciones"></th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function cargarDatos() {
            fetch('/espacios')
                .then(res => res.json())
                .then(data => {
                    const tabla = document.getElementById('tabla-cuerpo');
                    const indicador = document.getElementById('total-ocupado');
                    tabla.innerHTML = '';
                    let ocupados = 0;

                    data.forEach(e => {
                        const esOcupado = e.estado === 'ocupado';
                        if (esOcupado) ocupados++;

                        const patenteHTML = e.patente 
                            ? `<span class="patente-display">${e.patente}</span>` 
                            : `<span class="text-muted opacity-25">-------</span>`;

                        const tiempoHTML = esOcupado 
                            ? `<span class="text-info"><i class="bi bi-clock me-1"></i>${e.tiempo}</span>` 
                            : `<span class="text-muted opacity-25">--:-- hs</span>`;

                        const montoHTML = esOcupado 
                            ? `<span class="text-warning fw-bold">$${e.monto}</span>` 
                            : `<span class="text-muted opacity-25">$0.00</span>`;

                        // Pasamos el objeto entero como string para evitar errores en verInfo
                        const espacioJson = JSON.stringify(e).replace(/"/g, '&quot;');

                        tabla.innerHTML += `
                            <tr style="${esOcupado ? 'background: rgba(56, 189, 248, 0.03);' : ''}">
                                <td class="fw-bold">${e.numero}</td>
                                <td>
                                    <span class="status-pill ${esOcupado ? 'pill-ocupado' : 'pill-libre'}">
                                        ${e.estado.toUpperCase()}
                                    </span>
                                </td>
                                <td>${patenteHTML}</td>
                                <td>${tiempoHTML}</td>
                                <td>${montoHTML}</td>
                                <td class="text-end">
                                    <button onclick="verInfo('${espacioJson}')" class="btn-action">
                                        <i class="bi bi-info-circle"></i>
                                    </button>
                                    <button onclick="liberarCochera(${e.id})" class="btn-action ms-1 text-danger">
                                        <i class="bi bi-x-circle"></i>
                                    </button>
                                </td>
                            </tr>`;
                    });
                    indicador.innerText = `Ocupación: ${ocupados} / 30`;
                });
        }

        function verInfo(jsonStr) {
            const e = JSON.parse(jsonStr.replace(/&quot;/g, '"'));
            
            // Si el estado es ocupado, mostramos la info aunque la patente tarde en cargar
            if (e.estado === 'ocupado') {
                const p = e.patente || "Pendiente...";
                alert(`DETALLE ${e.numero.toUpperCase()}\n\n🚗 Patente: ${p}\n⏱️ Tiempo: ${e.tiempo}\n💰 Cobro parcial: $${e.monto}`);
            } else {
                alert(`La ${e.numero} se encuentra actualmente LIBRE.`);
            }
        }

        function liberarCochera(id) {
            if(confirm("¿Deseas liberar esta cochera manualmente?")) {
                fetch(`/egreso/${id}`, { method: 'POST' })
                .then(() => cargarDatos());
            }
        }

        function resetearBase() {
            if(confirm("¿Limpiar todo el estacionamiento?")) {
                fetch('/admin/reset', { method: 'POST' })
                .then(() => cargarDatos());
            }
        }

        cargarDatos();
        // Bajamos el intervalo a 5 segundos para que Claudio y Tomás vean el tiempo fluir más seguido
        setInterval(cargarDatos, 5000);
    </script>
</body>
</html>
